<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClickFS Códigos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060810;
      --surface: #0d1117;
      --surface2: #111827;
      --border: rgba(99,202,255,0.12);
      --accent: #00d4ff;
      --accent2: #0077ff;
      --accent-glow: rgba(0,212,255,0.25);
      --text: #e8f4ff;
      --muted: #5a7a99;
      --error: #ff4d6d;
      --success: #00ffb3;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,120,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(0,119,255,0.1));
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 20px;
      margin-bottom: 24px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s infinite;
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .platforms {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .platform-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      position: relative;
      overflow: hidden;
    }

    .platform-btn:hover {
      border-color: rgba(0,212,255,0.3);
      color: var(--text);
      transform: translateY(-1px);
    }

    .platform-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,255,0.06);
      box-shadow: 0 0 20px rgba(0,212,255,0.1);
    }

    .platform-btn.active::after {
      content: '✓';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--accent);
    }

    .platform-icon {
      font-size: 20px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    input[type="email"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 16px 16px 44px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="email"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
    }

    input[type="email"]::placeholder {
      color: var(--muted);
    }

    .btn-buscar {
      width: 100%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 12px;
      padding: 18px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-buscar:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,119,255,0.4);
    }

    .btn-buscar:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-buscar .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    /* Result Box */
    .result-box {
      margin-top: 24px;
      border-radius: 14px;
      padding: 24px;
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .result-box.success {
      background: rgba(0,255,179,0.05);
      border: 1px solid rgba(0,255,179,0.25);
    }

    .result-box.error {
      background: rgba(255,77,109,0.05);
      border: 1px solid rgba(255,77,109,0.25);
    }

    .result-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .result-box.success .result-label { color: var(--success); }
    .result-box.error .result-label { color: var(--error); }

    .result-code {
      font-family: 'Orbitron', monospace;
      font-size: 24px;
      font-weight: 900;
      color: var(--success);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,255,179,0.4);
      margin-bottom: 8px;
    }

    .result-msg {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Container de Botões */
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .copy-btn, .link-btn {
      flex: 1;
      background: rgba(0,255,179,0.1);
      border: 1px solid rgba(0,255,179,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--success);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s;
    }

    .copy-btn:hover { background: rgba(0,255,179,0.15); }

    .link-btn {
      background: linear-gradient(135deg, #e50914, #b20710);
      border: none;
      color: #fff;
    }
    .link-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Visualizador do E-mail Original (Iframe) */
    .email-preview-container {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      display: none;
    }

    .email-iframe {
      width: 100%;
      height: 320px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff; /* Fundo branco para simular o e-mail original */
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      color: var(--muted);
      font-size: 12px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .scanning-bar {
      display: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      margin-top: 20px;
      animation: scanLine 1.5s ease-in-out infinite;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--accent); }
      50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes scanLine {
      0% { transform: scaleX(0); opacity: 0; }
      50% { transform: scaleX(1); opacity: 1; }
      100% { transform: scaleX(0); opacity: 0; }
    }

    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
      .action-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <span class="logo-text">ClickFS</span>
      </div>
      <h1>Buscar Código</h1>
      <p class="subtitle">Digite seu e-mail e selecione a plataforma</p>
    </div>

    <div class="card">
      <p class="section-label">Plataforma</p>
      <div class="platforms">
        <button class="platform-btn" data-platform="netflix" onclick="selectPlatform(this)">
          <span class="platform-icon">🎬</span> Netflix
        </button>
        <button class="platform-btn" data-platform="disney" onclick="selectPlatform(this)">
          <span class="platform-icon">🏰</span> Disney+
        </button>
        <button class="platform-btn" data-platform="max" onclick="selectPlatform(this)">
          <span class="platform-icon">📺</span> Max
        </button>
        <button class="platform-btn" data-platform="globoplay" onclick="selectPlatform(this)">
          <span class="platform-icon">🌎</span> Globoplay
        </button>
      </div>

      <div class="input-group">
        <p class="section-label">Seu E-mail</p>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input type="email" id="emailInput" placeholder="seuemail@exemplo.com" autocomplete="email" />
        </div>
      </div>

      <button class="btn-buscar" id="btnBuscar" onclick="buscarCodigo()">
        <span class="btn-content">
          <span id="btnIcon">⚡</span>
          <span id="btnText">BUSCAR CÓDIGO</span>
          <div class="spinner" id="spinner"></div>
        </span>
      </button>

      <div class="scanning-bar" id="scanningBar"></div>

      <div class="result-box" id="resultBox">
        <p class="result-label" id="resultLabel">Resultado</p>
        <div class="result-code" id="resultCode"></div>
        <p class="result-msg" id="resultMsg"></p>
        
        <div class="action-buttons">
          <button class="copy-btn" id="copyBtn" onclick="copiarCodigo()" style="display:none">
            📋 Copiar código
          </button>
          <a class="link-btn" id="linkBtn" href="#" target="_blank" style="display:none">
            🔴 Abrir Link Direto
          </a>
        </div>

        <div class="email-preview-container" id="emailPreviewContainer">
          <p class="section-label" style="margin-bottom: 6px;">Mensagem Original:</p>
          <iframe class="email-iframe" id="emailIframe"></iframe>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>ClickFS Códigos &nbsp;·&nbsp; Busca automática segura</p>
    </div>
  </div>

  <script>
    let selectedPlatform = null;

    function selectPlatform(btn) {
      document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPlatform = btn.dataset.platform;
      hideResult();
    }

    function setLoading(loading) {
      const btn = document.getElementById('btnBuscar');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');
      const scanningBar = document.getElementById('scanningBar');

      btn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnIcon.style.display = loading ? 'none' : 'inline';
      btnText.textContent = loading ? 'BUSCANDO...' : 'BUSCAR CÓDIGO';
      scanningBar.style.display = loading ? 'block' : 'none';
    }

    function hideResult() {
      document.getElementById('resultBox').style.display = 'none';
    }

    function showResult(success, code, msg, link = null, htmlEmail = null) {
      const box = document.getElementById('resultBox');
      const label = document.getElementById('resultLabel');
      const codeEl = document.getElementById('resultCode');
      const msgEl = document.getElementById('resultMsg');
      const copyBtn = document.getElementById('copyBtn');
      const linkBtn = document.getElementById('linkBtn');
      const previewContainer = document.getElementById('emailPreviewContainer');
      const iframe = document.getElementById('emailIframe');

      box.className = 'result-box ' + (success ? 'success' : 'error');
      box.style.display = 'block';

      if (success) {
        label.textContent = '✅ Sucesso';
        codeEl.textContent = code || 'LINK ENCONTRADO';
        codeEl.style.display = 'block';
        msgEl.textContent = msg || 'Abaixo estão as opções e mensagem do e-mail.';
        
        // Exibe botão de copiar se houver código em texto simples
        copyBtn.style.display = (code && code !== 'LINK ENCONTRADO') ? 'inline-block' : 'none';
        
        // Configura o Link do Botão Vermelho (caso o backend extraia)
        if (link) {
          linkBtn.href = link;
          linkBtn.style.display = 'inline-block';
        } else {
          linkBtn.style.display = 'none';
        }

        // Renderiza o HTML do e-mail dentro do iframe
        if (htmlEmail) {
          previewContainer.style.display = 'block';
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          doc.open();
          doc.write(htmlEmail);
          doc.close();
        } else {
          previewContainer.style.display = 'none';
        }

      } else {
        label.textContent = '❌ Não encontrado';
        codeEl.style.display = 'none';
        msgEl.textContent = msg || 'Nenhum dado encontrado.';
        copyBtn.style.display = 'none';
        linkBtn.style.display = 'none';
        previewContainer.style.display = 'none';
      }
    }

    function copiarCodigo() {
      const code = document.getElementById('resultCode').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅ Copiado!';
        setTimeout(() => btn.textContent = '📋 Copiar código', 2000);
      });
    }

    async function buscarCodigo() {
      const email = document.getElementById('emailInput').value.trim();

      if (!email) {
        document.getElementById('emailInput').focus();
        return;
      }

      if (!selectedPlatform) {
        alert('Selecione uma plataforma primeiro.');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showResult(false, null, 'E-mail inválido. Verifique e tente novamente.');
        return;
      }

      setLoading(true);
      hideResult();

      try {
        const response = await fetch('/api/buscar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, platform: selectedPlatform }),
        });

        const data = await response.json();

        if (data.success) {
          // O seu backend deve enviar propriedades como: data.code, data.link, data.html_email
          showResult(true, data.code, data.message, data.link, data.html_email);
        } else {
          showResult(false, null, data.message || data.error || 'Código não encontrado.');
        }
      } catch (err) {
        showResult(false, null, 'Erro de conexão. Verifique se o servidor está ativo.');
      } finally {
        setLoading(false);
      }
    }

    document.getElementById('emailInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') buscarCodigo();
    });
  </script>
</body>
</html>
